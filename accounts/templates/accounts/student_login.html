<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: white; /* ✅ White background */
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .login-box {
            background: #f9f9f9;
            padding: 30px;
            border-radius: 10px;
            width: 320px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        h2 {
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        .form-group {
            display: flex;
            align-items: center;
            margin: 15px 0;
        }

        label {
            width: 90px;
            font-weight: bold;
        }

        input {
            flex: 1;
            padding: 8px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }

        button {
            width: 100%;
            margin-top: 20px;
            padding: 10px;
            background: #2c3e50;
            border: none;
            color: white;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background: #1a252f;
        }

        .error {
            color: red;
            text-align: center;
            margin-top: 10px;
        }
        .logout-container {
    position: fixed;
    top: 15px;
    right: 20px;
}

.logout-btn {
    background: #2c3e50;
    color: white;
    padding: 8px 15px;
    text-decoration: none;
    border-radius: 5px;
    font-weight: bold;
}

.logout-btn:hover {
    background: #1a252f;
}
    </style>
</head>

<body>
    <div class="logout-container">
    <a href="/logout/" class="logout-btn">🚪 Logout</a>
</div>
    
    



<div class="login-box">
    <h2>🎓 Student Login</h2>

    <form method="POST">
    {% csrf_token %}

    <div class="form-group">
        <label>Roll No:</label>
        <input type="text" name="roll_no" placeholder="Enter Roll No" required>
    </div>

    <div class="form-group">
        <label>Password:</label>
        <input type="password" id="password" name="password" placeholder="Enter Password" required>
    </div>


    <!-- Password Hint -->
    <p style="font-size:12px; color:gray;">
        
    </p>

    <button type="submit">Login</button>
</form>

    {% for message in messages %}
    <p style="color:red; text-align:center;">{{ message }}</p>
{% endfor %}

    
</div>

</body>
</html>
