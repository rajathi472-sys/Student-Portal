<!DOCTYPE html>
<html>
<head>
    <title>Student Portal</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f6f7f9, #e7e5ea);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            background: white;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            text-align: center;
            width: 340px;
        }

        h1 {
            margin-bottom: 10px;
            color: #333;
            font-size: 26px;
        }

        .subtitle {
            color: #888;
            font-size: 13px;
            margin-bottom: 30px;
        }

        .divider {
            font-size: 11px;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 18px 0 10px;
        }

        .btn {
            display: block;
            text-decoration: none;
            padding: 14px;
            margin: 10px 0;
            border-radius: 8px;
            font-size: 16px;
            color: white;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn:hover {
            transform: scale(1.03);
            opacity: 0.92;
        }

        .student  { background-color: #1565C0; }
        .teacher  { background-color: #2E7D32; }
        .admin    { background-color: #b71c1c; }
        .mgmt     { background-color: #4A148C; }
    </style>
</head>
<body>

    <div class="card">
        <h1>🎓 PORTAL</h1>
        <p class="subtitle">Student Management System</p>

        <div class="divider">Students & Teachers</div>
        <a href="/student/login/" class="btn student">Student Login</a>
        <a href="/teacher/login/" class="btn teacher">Teacher Login</a>

        <div class="divider">Administration</div>

        <a href="/management-login/" class="btn mgmt">Management Login</a>
    </div>

</body>
</html>
