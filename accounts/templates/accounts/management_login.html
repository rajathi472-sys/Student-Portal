<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Management Login</title>

    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: #f5f4f0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .login-card {
            background: white;
            padding: 2rem;
            width: 100%;
            max-width: 380px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            border: 1px solid #e2e2e2;
        }

        .login-card h2 {
            font-size: 22px;
            margin-bottom: 6px;
        }

        .login-card p {
            font-size: 13px;
            color: #6b6b6b;
            margin-bottom: 1.5rem;
        }

        .form-group {
            margin-bottom: 1.2rem;
        }

        .form-group label {
            font-size: 12px;
            color: #6b6b6b;
            display: block;
            margin-bottom: 5px;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 10px;
            border: 1px solid #ddd;
            font-size: 14px;
            outline: none;
        }

        .form-group input:focus {
            border-color: #000;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #000;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 14px;
            cursor: pointer;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .msg {
            background: #fef2f2;
            color: #b91c1c;
            padding: 10px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 1rem;
        }

        .back {
            display: block;
            margin-top: 1rem;
            text-align: center;
            font-size: 12px;
            color: #6b6b6b;
            text-decoration: none;
        }

        .back:hover {
            color: black;
        }
    </style>
</head>
<body>

<div class="login-card">

    <h2>Management Login</h2>
    <p>Access fee approvals and student records</p>

    {% for message in messages %}
        <div class="msg">{{ message }}</div>
    {% endfor %}

    <form method="POST">
        {% csrf_token %}

        <div class="form-group">
            <label>Management ID</label>
            <input type="text" name="management_id" placeholder="Enter ID" required>
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" name="password" placeholder="Enter password" required>
        </div>

        <button type="submit" class="btn">Login</button>
    </form>

    <a href="/" class="back">← Back to Home</a>

</div>

</body>
</html>
